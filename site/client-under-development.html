<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Projects Under Development – Yinson</title>
    <!-- Uses the main stylesheet to keep the visual consistent -->
    <link rel="stylesheet" href="./app.css" />
    <style>
      body {
        margin: 0;
        padding: 16px;
        background-color: #041a2d;
        color: #dcecf6;
        font-family: sans-serif;
      }
      h1 {
        margin: 0 0 16px;
        font-size: 1.5rem;
        color: #7bd5ff;
      }
      /* Progress bar */
      .progress-container {
        width: 100%;
        height: 4px;
        background: rgba(255, 255, 255, 0.1);
        margin-bottom: 16px;
        overflow: hidden;
        border-radius: 2px;
      }
      .progress-bar {
        width: 0%;
        height: 100%;
        background: #7bd5ff;
        transition: width 0.2s ease;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 1120px;
      }
      body {
        overflow-x: auto;
      }
      th, td {
        padding: 8px 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        text-align: left;
      }
      th {
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 0.05em;
        background: rgba(4, 26, 45, 0.85);
        color: #7bd5ff;
      }
      tbody tr:hover {
        background: rgba(80, 180, 240, 0.12);
      }
      .placeholder {
        padding: 16px;
        text-align: center;
        color: #7bd5ff;
      }
      .view-link {
        color: #7bd5ff;
        text-decoration: underline;
        cursor: pointer;
      }
      /* Search field styles */
      .search-container {
        margin-bottom: 16px;
        display: flex;
        gap: 8px;
      }

      /* Image preview modal */
      .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.7);
        z-index: 1000;
      }
      .modal.active {
        display: flex;
      }
      .modal-content {
        position: relative;
        background: #062f4e;
        padding: 16px;
        border-radius: 4px;
        max-width: 90%;
        max-height: 90%;
        overflow: auto;
      }
      .modal-content img {
        max-width: 100%;
        height: auto;
        display: block;
        margin: 0 auto;
      }
      .modal-close {
        position: absolute;
        top: 8px;
        right: 12px;
        font-size: 24px;
        color: #7bd5ff;
        cursor: pointer;
      }
      .search-container input[type="text"] {
        flex: 1;
        padding: 8px 12px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 4px;
        background-color: #062f4e;
        color: #dcecf6;
      }
      .search-container button {
        padding: 8px 16px;
        border: none;
        border-radius: 4px;
        background-color: #7bd5ff;
        color: #041a2d;
        font-weight: bold;
        cursor: pointer;
      }

      /* Fix table header when scrolling. Each <th> in the header will stick to
         the top of the viewport so that column titles remain visible as the
         user scrolls down the list of projects. A z-index ensures the
         header stays above the table body. */
      table thead th {
        position: sticky;
        top: 0;
        z-index: 10;
        background: rgba(4, 26, 45, 0.85);
      }
    </style>
  </head>
  <body>
    <h1>Projects Under Development – Yinson</h1>
    <!-- Search field for Vessel, Work Order, ID Repair, Tag Number, SOB, Description or Status -->
    <div class="search-container">
      <input type="text" id="search-input" placeholder="Search Vessel, Work Order, ID Repair, Tag Number, SOB, Description or Status" />
      <button id="search-button" type="button">Search</button>
    </div>
    <div class="progress-container" id="progress-container" hidden>
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <table>
      <thead>
        <tr>
          <th>VESSEL</th>
          <th>WORK ORDER</th>
          <th>ID REPAIR</th>
          <th>TAG NUMBER</th>
          <th>SOB</th>
          <th>DESCRIPTION</th>
          <th>STATUS</th>
          <th>IMAGE</th>
        </tr>
      </thead>
      <tbody id="projects-body">
        <tr><td colspan="8" class="placeholder">Loading data…</td></tr>
      </tbody>
    </table>

    <!-- Image preview modal -->
    <div id="image-modal" class="modal">
      <div class="modal-content">
        <span class="modal-close" id="modal-close">&times;</span>
        <img id="modal-img" src="" alt="Image" />
      </div>
    </div>

    <script>
      // Function to show a simple progress bar while data is loading
      function startProgressBar() {
        const container = document.getElementById('progress-container');
        const bar = document.getElementById('progress-bar');
        container.hidden = false;
        bar.style.width = '0%';
        let percent = 0;
        const timer = setInterval(() => {
          percent = Math.min(percent + Math.random() * 10, 90);
          bar.style.width = percent + '%';
        }, 200);
        return () => {
          clearInterval(timer);
          bar.style.width = '100%';
          setTimeout(() => { container.hidden = true; }, 400);
        };
      }

      // Global variables to store loaded projects
      let allProjects = [];

      function escapeHtml(value) {
        return String(value ?? '').replace(/[&<>"']/g, (char) => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#039;'
        }[char]));
      }

      // Renders the project list in the table body
      function renderProjects(list) {
        const tbody = document.getElementById('projects-body');
        tbody.innerHTML = '';
        list.forEach((proj) => {
          const tr = document.createElement('tr');
          let imageLinks = '';
          if (proj.images && proj.images.length) {
            imageLinks = proj.images.map((img, idx) => {
              const label = (proj.images.length > 1) ? `View ${idx + 1}` : 'View image';
              // Adds extra classes to capture the click and open in a modal. It does not
              // set target to prevent opening a new tab.
              const safeId = encodeURIComponent(String(img.id || ''));
              const safeSheetId = encodeURIComponent(String(img.sheetId || ''));
              const directUrl = String(img.url || '');
              const href = directUrl || (safeSheetId ? `/api/client-under-dev-image?id=${safeId}&sheetId=${safeSheetId}` : `/api/client-under-dev-image?id=${safeId}`);
              return `<a href="${escapeHtml(href)}" class="view-link image-link" data-img-name="${escapeHtml(img.name || 'Image')}">${escapeHtml(label)}</a>`;
            }).join(', ');
          }
          tr.innerHTML = `
            <td>${escapeHtml(proj.vessel || '')}</td>
            <td>${escapeHtml(proj.workOrder || '')}</td>
            <td>${escapeHtml(proj.idRepair || '')}</td>
            <td>${escapeHtml(proj.tagNumber || '')}</td>
            <td>${escapeHtml(proj.sob || '')}</td>
            <td>${escapeHtml(proj.description || '')}</td>
            <td>${escapeHtml(proj.status || '')}</td>
            <td>${imageLinks}</td>
          `;
          tbody.appendChild(tr);
        });
        if (!list.length) {
          tbody.innerHTML = '<tr><td colspan="8" class="placeholder">No project under development was found.</td></tr>';
        }
        // After rendering the table, bind click events to images.
        bindImageLinkEvents();
      }

      // Loads projects from the Netlify endpoint /api/client-under-dev
      async function loadProjectsFromApi() {
        const tbody = document.getElementById('projects-body');
        tbody.innerHTML = '<tr><td colspan="8" class="placeholder">Loading data...</td></tr>';
        const stopProgress = startProgressBar();
        try {
          const res = await fetch('/api/client-under-dev', { cache: 'no-store' });
          const json = await res.json().catch(() => null);
          if (!res.ok || !json || json.ok === false) {
            const detail = json?.error || json?.details?.message || 'Error loading data';
            throw new Error(detail);
          }
          if (json.meta) console.info('[Yinson Under Dev] Mapeamento Smartsheet:', json.meta);
          const projects = (json && Array.isArray(json.data)) ? json.data : [];
          allProjects = projects;
          renderProjects(projects);
        } catch (err) {
          console.error(err);
          const message = escapeHtml(err?.message || 'Failed to load data.');
          tbody.innerHTML = `<tr><td colspan="8" class="placeholder">Failed to load data.<br><small>${message}</small><br><small>Open /api/client-under-dev?debug=1 to see the column mapping returned by the API.</small></td></tr>`;
        } finally {
          stopProgress();
        }
      }

      // Filters projects by search term (Vessel, Work Order, ID Repair, Tag Number, SOB, Description or Status)
      function searchProjects() {
        const inputEl = document.getElementById('search-input');
        const term = (inputEl.value || '').trim().toLowerCase();
        if (!term) {
          renderProjects(allProjects);
          return;
        }
        const filtered = allProjects.filter((proj) => {
          const fields = [
            proj.vessel,
            proj.workOrder,
            proj.idRepair,
            proj.tagNumber,
            proj.sob,
            proj.description,
            proj.status
          ];
          return fields.some((value) => String(value || '').toLowerCase().includes(term));
        });
        renderProjects(filtered);
      }

      // Binds search events after DOM loading
      document.addEventListener('DOMContentLoaded', () => {
        const searchBtn = document.getElementById('search-button');
        const searchInput = document.getElementById('search-input');
        if (searchBtn) searchBtn.addEventListener('click', searchProjects);
        if (searchInput) {
          searchInput.addEventListener('keypress', (ev) => {
            if (ev.key === 'Enter') {
              ev.preventDefault();
              searchProjects();
            }
          });
        }
      });

      // Function to bind click handlers to image links. When clicked, it opens
      // the image in a preview modal instead of starting a download or opening a new tab.
      function bindImageLinkEvents() {
        // Selects all dynamically created image links.
        const links = document.querySelectorAll('.image-link');
        links.forEach((link) => {
          link.addEventListener('click', (ev) => {
            ev.preventDefault();
            ev.stopPropagation();
            const href = link.getAttribute('href');
            const name = link.dataset.imgName || 'Image';
            showImageModal(href, name);
          });
        });
      }

      // Shows the image in a modal. Uses href to load the image through the internal
      // proxy, which redirects to the temporary URL. Sets alt with the file name for accessibility.
      function showImageModal(src, name) {
        const modal = document.getElementById('image-modal');
        const imgEl = document.getElementById('modal-img');
        const closeBtn = document.getElementById('modal-close');
        if (!modal || !imgEl) return;
        imgEl.src = src;
        imgEl.alt = name;
        modal.classList.add('active');
        // Adjusts body overflow to prevent background scrolling
        document.body.style.overflow = 'hidden';
        const closeHandler = () => {
          modal.classList.remove('active');
          imgEl.src = '';
          document.body.style.overflow = '';
          closeBtn.removeEventListener('click', closeHandler);
          modal.removeEventListener('click', outsideHandler);
        };
        const outsideHandler = (ev) => {
          if (ev.target === modal) {
            closeHandler();
          }
        };
        closeBtn.addEventListener('click', closeHandler);
        modal.addEventListener('click', outsideHandler);
      }

      // Image links use <a>. No additional click handler is required outside the modal flow.

      // Automatically loads data when the page opens
      document.addEventListener('DOMContentLoaded', () => {
        loadProjectsFromApi();
      });
    </script>
  </body>
</html>
